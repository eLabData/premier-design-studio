server {
    listen 80;
    server_name studio.elabdata.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name studio.elabdata.com.br;

    ssl_certificate /etc/letsencrypt/live/studio.elabdata.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/studio.elabdata.com.br/privkey.pem;

    # Required for FFmpeg WASM (SharedArrayBuffer)
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    client_max_body_size 500M;

    location / {
        proxy_pass http://premier-web:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
